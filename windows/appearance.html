<style>
.s-page { padding: 40px; max-width: 720px; }
.s-title { font-size: 22px; font-weight: 300; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
.s-title i { color: #00d4ff; font-size: 20px; }
.s-sub { color: #555; font-size: 13px; margin-bottom: 36px; }
.s-section { margin-bottom: 40px; }
.s-section-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #444; margin-bottom: 16px; }

/* Theme cards */
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.theme-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    user-select: none;
}
.theme-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(0,212,255,0.3); transform: translateY(-2px); }
.theme-card.selected { background: rgba(0,212,255,0.08); border-color: #00d4ff; }
.theme-preview-box {
    height: 70px;
    border-radius: 10px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    overflow: hidden;
}
.preview-dark { background: #0a0a0c; color: #444; }
.preview-light { background: #f0f2f5; color: #bbb; }
.preview-system { background: linear-gradient(to right, #0a0a0c 50%, #f0f2f5 50%); }
.preview-system i { mix-blend-mode: difference; color: #888; }
.theme-name { font-size: 13px; color: #888; }
.theme-card.selected .theme-name { color: #00d4ff; font-weight: 600; }

/* Accent color picker */
.color-row { display: flex; gap: 12px; flex-wrap: wrap; }
.color-dot {
    width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: 0.2s; position: relative;
}
.color-dot:hover { transform: scale(1.15); }
.color-dot.selected { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.2); }
.color-dot.selected::after {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    color: #fff;
}

/* Font size slider */
.slider-row { display: flex; align-items: center; gap: 16px; }
.slider-row input[type=range] {
    flex-grow: 1;
    -webkit-appearance: none;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: #00d4ff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,212,255,0.5);
}
.slider-label { font-size: 13px; color: #888; min-width: 36px; text-align: right; }

/* Save button */
.save-btn {
    background: #00d4ff;
    color: #000;
    border: none;
    padding: 13px 32px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: 0.2s;
    display: flex; align-items: center; gap: 8px;
}
.save-btn:hover { background: #00b8e6; box-shadow: 0 4px 20px rgba(0,212,255,0.35); }
.toast {
    display: inline-flex; align-items: center; gap: 8px;
    margin-left: 16px; font-size: 13px; color: #00d4ff;
    opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>

<div class="s-page">
    <div class="s-title"><i class="fa-solid fa-palette"></i> Appearance</div>
    <p class="s-sub">Customize the look and feel of Light Browser.</p>

    <div class="s-section">
        <div class="s-section-label">Theme</div>
        <div class="theme-grid">
            <div class="theme-card" id="theme-dark" onclick="selectTheme('dark')">
                <div class="theme-preview-box preview-dark"><i class="fa-solid fa-moon"></i></div>
                <div class="theme-name">Dark</div>
            </div>
            <div class="theme-card" id="theme-light" onclick="selectTheme('light')">
                <div class="theme-preview-box preview-light"><i class="fa-solid fa-sun"></i></div>
                <div class="theme-name">Light</div>
            </div>
            <div class="theme-card" id="theme-system" onclick="selectTheme('system')">
                <div class="theme-preview-box preview-system"><i class="fa-solid fa-circle-half-stroke"></i></div>
                <div class="theme-name">System</div>
            </div>
        </div>
    </div>

    <div class="s-section">
        <div class="s-section-label">Accent Color</div>
        <div class="color-row">
            <div class="color-dot" style="background:#00d4ff" data-color="#00d4ff" onclick="selectAccent(this)" title="Cyan"></div>
            <div class="color-dot" style="background:#ff0033" data-color="#ff0033" onclick="selectAccent(this)" title="Red"></div>
            <div class="color-dot" style="background:#7c3aed" data-color="#7c3aed" onclick="selectAccent(this)" title="Purple"></div>
            <div class="color-dot" style="background:#10b981" data-color="#10b981" onclick="selectAccent(this)" title="Green"></div>
            <div class="color-dot" style="background:#f59e0b" data-color="#f59e0b" onclick="selectAccent(this)" title="Amber"></div>
            <div class="color-dot" style="background:#ec4899" data-color="#ec4899" onclick="selectAccent(this)" title="Pink"></div>
        </div>
    </div>

    <div class="s-section">
        <div class="s-section-label">Font Size</div>
        <div class="slider-row">
            <span style="font-size:11px;color:#555">A</span>
            <input type="range" id="font-slider" min="12" max="20" value="15" oninput="updateFontLabel(this.value)">
            <span style="font-size:17px;color:#555">A</span>
            <span class="slider-label" id="font-label">15px</span>
        </div>
    </div>

    <div style="display:flex;align-items:center;margin-top:10px;">
        <button class="save-btn" onclick="saveAppearance()">
            <i class="fa-solid fa-floppy-disk"></i> Save Changes
        </button>
        <span class="toast" id="toast"><i class="fa-solid fa-check"></i> Saved!</span>
    </div>
</div>

<script>
    let selectedTheme = localStorage.getItem('lb-theme') || 'dark';
    let selectedAccent = localStorage.getItem('lb-accent') || '#00d4ff';
    let selectedFont = localStorage.getItem('lb-fontsize') || '15';

    function init() {
        // Restore theme
        selectTheme(selectedTheme, true);
        // Restore accent
        document.querySelectorAll('.color-dot').forEach(d => {
            if (d.dataset.color === selectedAccent) d.classList.add('selected');
        });
        // Restore font size
        document.getElementById('font-slider').value = selectedFont;
        document.getElementById('font-label').textContent = selectedFont + 'px';
    }

    function selectTheme(theme, silent) {
        selectedTheme = theme;
        document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('theme-' + theme).classList.add('selected');
        if (!silent) applyTheme(theme);
    }

    function applyTheme(theme) {
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        // Apply to parent window too if possible
        try {
            const target = window.parent.document.body;
            target.classList.toggle('light-mode', !isDark);
        } catch(e) {}
        document.body.style.background = isDark ? '#0a0a0c' : '#f0f2f5';
    }

    function selectAccent(el) {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
        selectedAccent = el.dataset.color;
        // Live preview
        try {
            window.parent.document.documentElement.style.setProperty('--accent-red', selectedAccent);
        } catch(e) {}
    }

    function updateFontLabel(val) {
        selectedFont = val;
        document.getElementById('font-label').textContent = val + 'px';
    }

    function saveAppearance() {
        localStorage.setItem('lb-theme', selectedTheme);
        localStorage.setItem('lb-accent', selectedAccent);
        localStorage.setItem('lb-fontsize', selectedFont);
        applyTheme(selectedTheme);
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    init();
</script>
