<style>
.s-page { padding: 40px; max-width: 720px; }
.s-title { font-size: 22px; font-weight: 300; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
.s-title i { color: #00d4ff; font-size: 20px; }
.s-sub { color: #555; font-size: 13px; margin-bottom: 36px; }
.s-section-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #444; margin-bottom: 16px; }

.lang-search {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 11px 16px;
    color: #fff;
    font-size: 14px;
    outline: none;
    margin-bottom: 20px;
    transition: 0.2s;
}
.lang-search:focus { border-color: rgba(0,212,255,0.4); background: rgba(255,255,255,0.06); }
.lang-search::placeholder { color: #444; }

.lang-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-height: 420px;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
}

.lang-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
}
.lang-card:hover { background: rgba(0,212,255,0.05); border-color: rgba(0,212,255,0.2); }
.lang-card.selected { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.4); }

.lang-left { display: flex; flex-direction: column; gap: 3px; }
.lang-name { font-size: 14px; color: #ccc; }
.lang-native { font-size: 11px; color: #555; }
.lang-card.selected .lang-name { color: #00d4ff; }

.lang-code {
    font-size: 10px;
    background: rgba(0,0,0,0.4);
    padding: 3px 8px;
    border-radius: 5px;
    color: #555;
    font-family: monospace;
}
.lang-card.selected .lang-code { color: #00d4ff; background: rgba(0,212,255,0.1); }

.save-btn {
    background: #00d4ff; color: #000; border: none;
    padding: 13px 32px; border-radius: 10px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    letter-spacing: 0.5px; transition: 0.2s;
    display: flex; align-items: center; gap: 8px; margin-top: 24px;
}
.save-btn:hover { background: #00b8e6; box-shadow: 0 4px 20px rgba(0,212,255,0.35); }
.toast { display: inline-flex; align-items: center; gap: 8px; margin-left: 16px; margin-top: 24px; font-size: 13px; color: #00d4ff; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
.bottom-row { display: flex; align-items: center; }
</style>

<div class="s-page">
    <div class="s-title"><i class="fa-solid fa-language"></i> Language</div>
    <p class="s-sub">Choose the display language for Light Browser.</p>

    <input class="lang-search" type="text" placeholder="Search languages..." oninput="filterLangs(this.value)">

    <div class="s-section-label">Available Languages</div>
    <div class="lang-grid" id="lang-grid"></div>

    <div class="bottom-row">
        <button class="save-btn" onclick="saveLang()">
            <i class="fa-solid fa-floppy-disk"></i> Save Language
        </button>
        <span class="toast" id="toast"><i class="fa-solid fa-check"></i> Language saved!</span>
    </div>
</div>

<script>
const LANGUAGES = [
    { code: 'en', name: 'English', native: 'English' },
    { code: 'bs', name: 'Bosnian', native: 'Bosanski' },
    { code: 'hr', name: 'Croatian', native: 'Hrvatski' },
    { code: 'sr', name: 'Serbian', native: 'Srpski' },
    { code: 'de', name: 'German', native: 'Deutsch' },
    { code: 'fr', name: 'French', native: 'Français' },
    { code: 'es', name: 'Spanish', native: 'Español' },
    { code: 'it', name: 'Italian', native: 'Italiano' },
    { code: 'pt', name: 'Portuguese', native: 'Português' },
    { code: 'nl', name: 'Dutch', native: 'Nederlands' },
    { code: 'pl', name: 'Polish', native: 'Polski' },
    { code: 'ru', name: 'Russian', native: 'Русский' },
    { code: 'uk', name: 'Ukrainian', native: 'Українська' },
    { code: 'tr', name: 'Turkish', native: 'Türkçe' },
    { code: 'ar', name: 'Arabic', native: 'العربية' },
    { code: 'zh', name: 'Chinese', native: '中文' },
    { code: 'ja', name: 'Japanese', native: '日本語' },
    { code: 'ko', name: 'Korean', native: '한국어' },
    { code: 'hi', name: 'Hindi', native: 'हिन्दी' },
    { code: 'sv', name: 'Swedish', native: 'Svenska' },
    { code: 'no', name: 'Norwegian', native: 'Norsk' },
    { code: 'da', name: 'Danish', native: 'Dansk' },
    { code: 'fi', name: 'Finnish', native: 'Suomi' },
    { code: 'cs', name: 'Czech', native: 'Čeština' },
];

let selectedLang = localStorage.getItem('lb-lang') || 'en';
let filtered = [...LANGUAGES];

function renderLangs() {
    const grid = document.getElementById('lang-grid');
    grid.innerHTML = filtered.map(l => `
        <div class="lang-card ${l.code === selectedLang ? 'selected' : ''}" onclick="selectLang('${l.code}')">
            <div class="lang-left">
                <span class="lang-name">${l.name}</span>
                <span class="lang-native">${l.native}</span>
            </div>
            <span class="lang-code">${l.code}</span>
        </div>
    `).join('');
}

function selectLang(code) {
    selectedLang = code;
    renderLangs();
}

function filterLangs(query) {
    const q = query.toLowerCase();
    filtered = LANGUAGES.filter(l =>
        l.name.toLowerCase().includes(q) ||
        l.native.toLowerCase().includes(q) ||
        l.code.toLowerCase().includes(q)
    );
    renderLangs();
}

function saveLang() {
    localStorage.setItem('lb-lang', selectedLang);
    const lang = LANGUAGES.find(l => l.code === selectedLang);
    if (lang) document.documentElement.lang = lang.code;
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

renderLangs();
</script>
