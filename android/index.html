<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="engine-menu.css">
    <link rel="stylesheet" href="renderer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- ═══════════════════════════════════════
     DESKTOP TITLE BAR (hidden on Android)
     ═══════════════════════════════════════ -->
<div class="title-bar" id="title-bar">
    <div class="title-bar-drag"></div>
    <div class="title-bar-controls">
        <button class="tb-btn tb-minimize" onclick="window.electronAPI?.minimize()" title="Minimize">
            <i class="fa-solid fa-minus"></i>
        </button>
        <button class="tb-btn tb-maximize" onclick="window.electronAPI?.maximize()" title="Maximize">
            <i class="fa-solid fa-square"></i>
        </button>
        <button class="tb-btn tb-close" onclick="window.electronAPI?.close()" title="Close">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
</div>

<!-- ═══════════════════════════════════════
     MAIN APP
     ═══════════════════════════════════════ -->
<div class="browser-app">

    <!-- DESKTOP SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-feather-pointed" style="color:#00d4ff;font-size:24px;"></i>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-btn active" id="new-tab-btn" title="New Tab">
                <i class="fa-solid fa-plus"></i>
            </button>
            <button class="nav-btn" title="Bookmarks">
                <i class="fa-solid fa-bookmark"></i>
            </button>
            <button class="nav-btn" title="History">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>
        </nav>
        <div class="sidebar-bottom">
            <button class="nav-btn settings" title="Settings" onclick="openSettings()">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- TAB BAR (desktop) -->
        <div class="tabs-outer-container">
            <div class="tab-bar" id="tab-bar"></div>
        </div>

        <!-- TOP NAV -->
        <header class="top-nav">
            <div class="search-container">
                <div class="search-glow" id="search-glow"></div>
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="url-input" placeholder="Search or type URL...">
                </div>
            </div>
        </header>

        <!-- CONTENT WRAPPER -->
        <div class="main-wrapper">

            <!-- DASHBOARD -->
            <div class="dashboard" id="dashboard">
                <div class="dashboard-content">
                    <div class="main-logo">
                        <i class="fa-solid fa-feather-pointed" style="color:#00d4ff;font-size:60px;"></i>
                        <h1>LIGHT<span>BROWSER</span></h1>
                    </div>

                    <div class="central-search">
                        <div class="search-glow-big"></div>
                        <input type="text" id="central-url-input" placeholder="Search the web securely...">
                        <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>

                    <div class="quick-links">
                        <a href="https://github.com"  class="link-card"><i class="fa-brands fa-github"></i><span>GitHub</span></a>
                        <a href="https://youtube.com" class="link-card"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
                        <a href="https://google.com"  class="link-card"><i class="fa-brands fa-google"></i><span>Google</span></a>
                        <a href="#"                   class="link-card add-link"><i class="fa-solid fa-plus"></i></a>
                    </div>
                </div>
            </div>

            <!-- ANDROID WEBVIEW AREA (hidden on desktop, used on Android) -->
            <div class="android-webview-area" id="android-webview-area" style="display:none;">
                <!-- Android WebView renders website here via Java, not iframe -->
                <!-- This div just acts as the visual placeholder / overlay area -->
            </div>

            <!-- DESKTOP iframe (used on desktop only) -->
            <iframe id="content-frame" src="about:blank"
                    style="width:100%;height:100%;border:none;display:none;background:white;"></iframe>

        </div><!-- /.main-wrapper -->

    </main>
</div><!-- /.browser-app -->

<!-- ═══════════════════════════════════════
     ANDROID BOTTOM BAR
     (hidden on desktop, shown on Android)
     Stays visible even when WebView is open
     ═══════════════════════════════════════ -->
<nav class="android-bottom-bar" id="android-bottom-bar">
    <button class="abb-btn" id="abb-back" onclick="window.electronAPI?.goBack()" title="Back">
        <i class="fa-solid fa-arrow-left"></i>
    </button>
    <button class="abb-btn" id="abb-forward" onclick="window.electronAPI?.goForward()" title="Forward">
        <i class="fa-solid fa-arrow-right"></i>
    </button>
    <button class="abb-btn abb-home" id="abb-home" onclick="androidGoHome()" title="Home">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="abb-btn" onclick="openSettings()" title="Settings">
        <i class="fa-solid fa-gear"></i>
    </button>
</nav>

<!-- Desktop title bar styles -->
<style>
    .title-bar {
        height: 32px;
        background: rgba(8,8,12,0.98);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        -webkit-app-region: drag;
        user-select: none;
        z-index: 9999;
    }
    .title-bar-drag { flex-grow: 1; height: 100%; -webkit-app-region: drag; }
    .title-bar-controls { display: flex; -webkit-app-region: no-drag; height: 100%; }
    .tb-btn {
        width: 46px; height: 32px;
        background: none; border: none;
        color: rgba(255,255,255,0.4);
        font-size: 11px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: 0.15s; -webkit-app-region: no-drag;
    }
    .tb-btn:hover     { background: rgba(255,255,255,0.08); color: #fff; }
    .tb-close:hover   { background: #e81123 !important; color: #fff !important; }

    /* Hide title bar on Android */
    .android-mode .title-bar { display: none !important; }
    .android-mode .browser-app { height: 100vh; }
</style>

<script src="android-bridge.js"></script>
<script src="renderer.js"></script>
</body>
</html>
