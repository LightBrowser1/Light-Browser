<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="engine-menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="browser-app">
        
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-feather-pointed" style="color: #00d4ff; font-size: 24px;"></i> 
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-btn active" id="new-tab-btn" title="New Tab"><i class="fa-solid fa-plus"></i></button>
                <button class="nav-btn" title="Bookmarks"><i class="fa-solid fa-bookmark"></i></button>
                <button class="nav-btn" title="History"><i class="fa-solid fa-clock-rotate-left"></i></button>
            </nav>

            <div class="sidebar-bottom">
                <button class="nav-btn settings" title="Settings" onclick="openSettings()">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="tabs-outer-container">
                <div class="tab-bar" id="tab-bar">
                </div>
            </div>

            <header class="top-nav">
                <div class="search-container">
                    <div class="search-glow" id="search-glow"></div> 
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="url-input" placeholder="Search or type URL...">
                    </div>
                </div>
            </header>

            <div class="webview-placeholder" style="position: relative; flex-grow: 1; display: flex; flex-direction: column; height: 100%;">
            <iframe id="content-frame" src="about:blank" style="width: 100%; height: 100%; border: none; display: none; background: white;"></iframe>
            </div>
                <div class="dashboard" id="dashboard">
                    <div class="dashboard-content">
                        <div class="main-logo">
                            <i class="fa-solid fa-feather-pointed" style="color: #00d4ff; font-size: 60px;"></i>
                            <h1>LIGHT<span>BROWSER</span></h1>
                        </div>

                        <div class="central-search">
                            <div class="search-glow-big"></div>
                            <input type="text" id="central-url-input" placeholder="Search the web securely...">
                            <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                        </div>

                        <div class="quick-links">
                            <a href="https://github.com" class="link-card"><i class="fa-brands fa-github"></i><span>GitHub</span></a>
                            <a href="https://youtube.com" class="link-card"><i class="fa-brands fa-youtube"></i><span>YouTube</span></a>
                            <a href="https://google.com" class="link-card"><i class="fa-brands fa-google"></i><span>Google</span></a>
                            <a href="#" class="link-card add-link"><i class="fa-solid fa-plus"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        
        </main> 
    </div> 
    <script src="renderer.js"></script>
</body>
</html>
